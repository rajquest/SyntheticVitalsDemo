<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <pre>{{ data.payload }}</pre>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button class="button secondary" type="button" (click)="exportPayload()">Export</button>
  <button class="dialog-close-button" type="button" mat-dialog-close>Close</button>
</mat-dialog-actions>
